<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Menlo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="assets/icon48.png" alt="Smart Menlo Icon">
      <h3>Smart Menlo</h3>
    </div>
    <div class="content">
      <p>If a website fails to load, it will automatically reconnect via Menlo Security.</p>
    </div>
    <div class="action">
      <label class="switch">
        <input type="checkbox" id="toggleSwitch">
        <span class="slider round"></span>
      </label>
      <span id="switchStatus">Disabled</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
